<nav style="--bs-breadcrumb-divider: '>';" aria-label="breadcrumb">
  <ol class="breadcrumb">
    <li class="breadcrumb-item" *ngFor="let item of items; let last = last">
      <a *ngIf="item.route && !last" [routerLink]="item.route" class="breadcrumb-item">
        {{ item.label }}
      </a>

      <span *ngIf="!item.route || last" class="breadcrumb-current">
        {{ item.label }}
      </span>
    </li>

  </ol>
</nav>
