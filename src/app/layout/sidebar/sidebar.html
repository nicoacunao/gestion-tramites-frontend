<aside class="sidebar" [class.collapsed]="isCollapsed">
    <div class="sidebar-header">
        <div class="sidebar-brand">
            <mat-icon aria-hidden="true">account_tree</mat-icon>
            @if (!isCollapsed) {
                <span>Gestión de Trámites</span>
            }
        </div>

        <button
            mat-icon-button
            type="button"
            class="sidebar-toggle"
            [attr.aria-label]="isCollapsed ? 'Abrir menú lateral' : 'Cerrar menú lateral'"
            [attr.title]="isCollapsed ? 'Abrir menú lateral' : 'Cerrar menú lateral'"
            (click)="toggleSidebar()"
        >
            <mat-icon aria-hidden="true">{{ isCollapsed ? 'chevron_right' : 'chevron_left' }}</mat-icon>
        </button>
    </div>

    <nav class="sidebar-nav">
        @for (item of menuItems; track item.route) {
        <a
            [routerLink]="item.route"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: item.exact }"
            [attr.aria-label]="item.label"
            [attr.title]="isCollapsed ? item.label : null"
        >
            <mat-icon aria-hidden="true">{{ item.icon }}</mat-icon>
            @if (!isCollapsed) {
                <span>{{ item.label }}</span>
            }
        </a>
        }
    </nav>
</aside>
