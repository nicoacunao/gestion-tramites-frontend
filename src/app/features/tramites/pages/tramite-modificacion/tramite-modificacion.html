<section class="w-100">
  <div class="mb-4">
    <app-breadcrumbs [items]="breadcrumbs"></app-breadcrumbs>
  </div>

  <div
    class="d-flex flex-wrap align-items-center justify-content-between gap-3 mb-4"
  >
    <div>
      <h2 class="h4 mb-1">Modificar trámite #{{ tramiteId }}</h2>
      <p class="text-body-secondary mb-0">
        Actualiza los antecedentes y los hitos de gestión.
      </p>
    </div>
    <span class="badge rounded-pill text-bg-warning">{{ tramite.estado }}</span>
  </div>

  <form (ngSubmit)="grabar()" class="d-flex flex-column gap-4">
    <section class="card border-0 shadow-sm">
      <div class="card-header bg-body py-3">
        <h3 class="h5 mb-0">Datos generales</h3>
      </div>
      <div class="card-body p-3 p-md-4">
        <div class="alert alert-light border d-flex align-items-center mb-4">
          <span
            >Los datos generales son informativos y no pueden modificarse.</span
          >
        </div>

        <div class="row g-3">
          <div class="col-12 col-lg-6">
            <label class="form-label text-body-secondary"
              >Estación de servicio</label
            >
            <input
              class="form-control-plaintext fw-medium"
              readonly
              [value]="tramite.estacionServicio"
            />
          </div>
          <div class="col-12 col-md-6 col-lg-3">
            <label class="form-label text-body-secondary">Prioridad</label>
            <input
              class="form-control-plaintext fw-medium"
              readonly
              [value]="tramite.prioridad"
            />
          </div>
          <div class="col-12 col-md-6 col-lg-3">
            <label class="form-label text-body-secondary">Estado</label>
            <input
              class="form-control-plaintext fw-medium"
              readonly
              [value]="tramite.estado"
            />
          </div>
          <div class="col-12 col-lg-6">
            <label class="form-label text-body-secondary">Concesionario</label>
            <input
              class="form-control-plaintext fw-medium"
              readonly
              [value]="tramite.concesionario"
            />
          </div>
          <div class="col-12 col-lg-6">
            <label class="form-label text-body-secondary"
              >Responsable interno</label
            >
            <input
              class="form-control-plaintext fw-medium"
              readonly
              [value]="tramite.responsableInterno"
            />
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label text-body-secondary"
              >Tipo de trámite</label
            >
            <input
              class="form-control-plaintext fw-medium"
              readonly
              [value]="tramite.tipoTramite"
            />
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label text-body-secondary"
              >Trámite específico</label
            >
            <input
              class="form-control-plaintext fw-medium"
              readonly
              [value]="tramite.tramiteEspecifico"
            />
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label text-body-secondary"
              >Solicitante Copec</label
            >
            <input
              class="form-control-plaintext fw-medium"
              readonly
              [value]="tramite.solicitanteCopec"
            />
          </div>
          <div class="col-12 col-md-3">
            <label class="form-label text-body-secondary"
              >Fecha de apertura</label
            >
            <input
              class="form-control-plaintext fw-medium"
              readonly
              [value]="tramite.fechaApertura"
            />
          </div>
          <div class="col-12 col-md-3">
            <label class="form-label text-body-secondary"
              >Fecha estimada de término</label
            >
            <input
              class="form-control-plaintext fw-medium"
              readonly
              [value]="tramite.fechaEstimadaTermino"
            />
          </div>
        </div>
      </div>
    </section>

    <section class="card border-0 shadow-sm p-3 p-md-4">
      <h3 class="h5 mb-4">Antecedentes requeridos</h3>

      <div
        class="border rounded-3 p-3 mb-4"
        *ngFor="let item of antecedentesRequeridos; let i = index"
      >
        <div class="row g-3 align-items-end">
          <div class="col-12 col-md-6 col-lg-4">
            <label class="form-label">Antecedente</label>
            <input
              class="form-control"
              [name]="'antecedenteReq' + i"
              [(ngModel)]="item.antecedente"
            />
          </div>
          <div class="col-12 col-md-6 col-lg-2">
            <div class="form-check form-switch pt-md-4">
              <input
                class="form-check-input"
                type="checkbox"
                [id]="'obligatorioReq' + i"
                [name]="'obligatorioReq' + i"
                [(ngModel)]="item.obligatorio"
              />
              <label class="form-check-label" [for]="'obligatorioReq' + i"
                >Obligatorio</label
              >
            </div>
          </div>
          <div class="col-12 col-md-6 col-lg-3">
            <label class="form-label">Responsable</label>
            <select
              class="form-select"
              [name]="'responsableReq' + i"
              [(ngModel)]="item.responsable"
            >
              <option value="">Seleccione responsable</option>
              <option
                *ngFor="let responsable of responsables"
                [value]="responsable"
              >
                {{ responsable }}
              </option>
            </select>
          </div>
          <div class="col-12 col-md-6 col-lg-3">
            <label class="form-label">Estado</label>
            <select
              class="form-select"
              [name]="'estadoReq' + i"
              [(ngModel)]="item.estado"
            >
              <option value="">Seleccione estado</option>
              <option *ngFor="let estado of estados" [value]="estado">
                {{ estado }}
              </option>
            </select>
          </div>
          <div class="col-12 col-lg-4">
            <label class="form-label">Reemplazar archivo</label>
            <input class="form-control" type="file" [name]="'archivoReq' + i" />
          </div>
          <div class="col-12 col-lg-8">
            <label class="form-label">Observaciones</label>
            <textarea
              class="form-control"
              [name]="'observacionesReq' + i"
              [(ngModel)]="item.observaciones"
            ></textarea>
          </div>
        </div>
      </div>

      <div class="d-flex justify-content-end">
        <button
          type="button"
          class="btn btn-outline-success btn-sm"
          (click)="agregarAntecedenteRequerido()"
        >
          + Agregar
        </button>
      </div>
    </section>

    <section class="card border-0 shadow-sm p-3 p-md-4">
      <h3 class="h5 mb-4">Antecedentes extraordinarios</h3>

      <div
        class="border rounded-3 p-3 mb-4"
        *ngFor="let item of antecedentesExtraordinarios; let i = index"
      >
        <div class="row g-3 align-items-end">
          <div class="col-12 col-md-6 col-lg-4">
            <label class="form-label">Antecedente</label>
            <input
              class="form-control"
              [name]="'antecedenteExtra' + i"
              [(ngModel)]="item.antecedente"
            />
          </div>
          <div class="col-12 col-md-6 col-lg-2">
            <div class="form-check form-switch pt-md-4">
              <input
                class="form-check-input"
                type="checkbox"
                [id]="'obligatorioExtra' + i"
                [name]="'obligatorioExtra' + i"
                [(ngModel)]="item.obligatorio"
              />
              <label class="form-check-label" [for]="'obligatorioExtra' + i"
                >Obligatorio</label
              >
            </div>
          </div>
          <div class="col-12 col-md-6 col-lg-3">
            <label class="form-label">Responsable</label>
            <select
              class="form-select"
              [name]="'responsableExtra' + i"
              [(ngModel)]="item.responsable"
            >
              <option value="">Seleccione responsable</option>
              <option
                *ngFor="let responsable of responsables"
                [value]="responsable"
              >
                {{ responsable }}
              </option>
            </select>
          </div>
          <div class="col-12 col-md-6 col-lg-3">
            <label class="form-label">Estado</label>
            <select
              class="form-select"
              [name]="'estadoExtra' + i"
              [(ngModel)]="item.estado"
            >
              <option value="">Seleccione estado</option>
              <option *ngFor="let estado of estados" [value]="estado">
                {{ estado }}
              </option>
            </select>
          </div>
          <div class="col-12 col-lg-4">
            <label class="form-label">Reemplazar archivo</label>
            <input
              class="form-control"
              type="file"
              [name]="'archivoExtra' + i"
            />
          </div>
          <div class="col-12 col-lg-8">
            <label class="form-label">Observaciones</label>
            <textarea
              class="form-control"
              [name]="'observacionesExtra' + i"
              [(ngModel)]="item.observaciones"
            ></textarea>
          </div>
        </div>
      </div>

      <div class="d-flex justify-content-end">
        <button
          type="button"
          class="btn btn-outline-success btn-sm"
          (click)="agregarAntecedenteExtraordinario()"
        >
          + Agregar
        </button>
      </div>
    </section>

    <section class="card border-0 shadow-sm p-3 p-md-4">
      <h3 class="h5 mb-4">Hitos de gestión</h3>

      <div
        class="row g-3 align-items-end border rounded-3 p-3 mx-0 mb-4"
        *ngFor="let item of hitosGestion; let i = index"
      >
        <div class="col-12 col-md-6 col-lg-4">
          <label class="form-label">Hito</label>
          <input
            class="form-control"
            [name]="'hito' + i"
            [(ngModel)]="item.hito"
          />
        </div>
        <div class="col-12 col-md-6 col-lg-2">
          <label class="form-label">Estado</label>
          <select
            class="form-select"
            [name]="'estadoHito' + i"
            [(ngModel)]="item.estado"
          >
            <option value="">Seleccione estado</option>
            <option *ngFor="let estado of estados" [value]="estado">
              {{ estado }}
            </option>
          </select>
        </div>
        <div class="col-12 col-md-6 col-lg-3">
          <label class="form-label">Fecha estimada</label>
          <input
            class="form-control"
            type="date"
            [name]="'fechaEstimada' + i"
            [(ngModel)]="item.fechaEstimada"
          />
        </div>
        <div class="col-12 col-md-6 col-lg-3">
          <label class="form-label">Fecha real</label>
          <input
            class="form-control"
            type="date"
            [name]="'fechaReal' + i"
            [(ngModel)]="item.fechaReal"
          />
        </div>
        <div class="col-12 col-lg-4">
          <label class="form-label">Responsable</label>
          <select
            class="form-select"
            [name]="'responsableHito' + i"
            [(ngModel)]="item.responsable"
          >
            <option value="">Seleccione responsable</option>
            <option
              *ngFor="let responsable of responsables"
              [value]="responsable"
            >
              {{ responsable }}
            </option>
          </select>
        </div>
        <div class="col-12 col-lg-8">
          <label class="form-label">Observación</label>
          <textarea
            class="form-control"
            [name]="'observacionHito' + i"
            [(ngModel)]="item.observacion"
          ></textarea>
        </div>
      </div>

      <div class="d-flex justify-content-end">
        <button
          type="button"
          class="btn btn-outline-success btn-sm"
          (click)="agregarHito()"
        >
          + Agregar
        </button>
      </div>
    </section>

    <div class="d-flex flex-wrap justify-content-end gap-2 pb-4">
      <a
        [routerLink]="['/tramites', tramiteId]"
        class="btn btn-outline-secondary"
      >
        Cancelar
      </a>
      <button type="submit" class="btn btn-success">Grabar cambios</button>
    </div>
  </form>
</section>
